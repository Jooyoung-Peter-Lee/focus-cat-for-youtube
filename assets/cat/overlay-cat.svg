<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" id="focus-cat-svg" viewBox="0 0 512 512"
     overflow="hidden" style="display:block;width:100%;height:100%">
  <title>Focus Cat Overlay</title>
  <desc>Minimal hand-drawn style cat face icon for overlay use.</desc>

  <defs>
    <style>
      /* ── Base classes ────────────────────────────────────────────────────────
         Scoped to #focus-cat-svg to prevent leaking into the host page. */
      #focus-cat-svg .stroke    { fill: none; stroke: #1f1a17; stroke-width: 22; stroke-linecap: round; stroke-linejoin: round; }
      #focus-cat-svg .fill-dark { fill: #1f1a17; }
      #focus-cat-svg .fill-pink { fill: #f6a6a8; }
      #focus-cat-svg .fill-star { fill: #f4c64f; }
      #focus-cat-svg .shadow    { fill: #efe4d2; opacity: 0.65; }

      /* ── 1. Eye blink ────────────────────────────────────────────────────────
         Blink at ~93.5 % of each 4 s cycle. 0.06 s delay on right eye keeps
         them in near-sync while looking natural. */
      #fc-eye-left, #fc-eye-right {
        transform-box: fill-box;
        transform-origin: center;
        animation: fc-blink 4s ease-in-out infinite;
      }
      #fc-eye-right { animation-delay: 0.06s; }

      @keyframes fc-blink {
        0%, 91%, 96%, 100% { transform: scaleY(1);    }
        93.5%              { transform: scaleY(0.08); }
      }

      /* ── 2. Ear twitch (right ear) ───────────────────────────────────────────
         Three-step twitch every 5 s; 1.2 s delay staggers away from first blink. */
      #fc-ear-right {
        transform-box: fill-box;
        transform-origin: center bottom;
        animation: fc-ear-twitch 5s ease-in-out infinite;
        animation-delay: 1.2s;
      }

      @keyframes fc-ear-twitch {
        0%, 84%, 96%, 100% { transform: rotate(0deg);   }
        88%                { transform: rotate(-10deg); }
        91%                { transform: rotate(5deg);   }
        94%                { transform: rotate(-2deg);  }
      }

      /* ── 3. Tail wag — omitted (no tail element in this design). ──────────── */

      /* ── 4. Star pulse ───────────────────────────────────────────────────────
         Continuous breathe: scale 1 → 1.35 → 1 every 2.4 s. */
      #fc-star {
        transform-box: fill-box;
        transform-origin: center;
        animation: fc-star-pulse 2.4s ease-in-out infinite;
      }

      @keyframes fc-star-pulse {
        0%, 100% { transform: scale(1);    opacity: 1;   }
        50%      { transform: scale(1.35); opacity: 0.8; }
      }

      /* ── 5. Head tilt + grooming coordination ────────────────────────────────
         Runs on the same 10 s cycle as the paw so tilts land exactly during the
         lick (lean left) and wipe (tilt right) phases.
         2 s delay keeps this clear of the opening blink. */
      #fc-head-group {
        transform-box: fill-box;
        transform-origin: center;
        animation: fc-head-tilt 10s ease-in-out infinite;
        animation-delay: 2s;
      }

      @keyframes fc-head-tilt {
        0%, 60%       { transform: rotate(0deg);  }  /* long neutral             */
        65%           { transform: rotate(-2deg); }  /* pre-groom fidget left    */
        70%           { transform: rotate(0deg);  }  /* neutral as paw arrives   */
        77%           { transform: rotate(-3deg); }  /* lean into the lick       */
        80%           { transform: rotate(5deg);  }  /* tilt right for the wipe  */
        87%, 100%     { transform: rotate(0deg);  }  /* settle back              */
      }

      /* ── 6a. Grooming eye squint ─────────────────────────────────────────────
         Applied to #fc-eye-right-g (a group wrapping the right-eye circle) so
         it COMPOSES with the existing fc-blink on the circle itself rather than
         overriding it. Parent scaleY × child scaleY stack multiplicatively.

         Same 10 s cycle + 2 s delay as fc-paw-groom for frame-perfect sync.

         Timing relative to the 10 s grooming cycle:
           75 → 79 %  squint closes as paw begins wiping   (wipe starts 76 %)
           79 → 82 %  squint holds at scaleY(0.2) — wince, not full close
           82 → 86 %  eye reopens as paw retracts           (wipe ends  83 %) */
      #fc-eye-right-g {
        transform-box: fill-box;
        transform-origin: center;
        animation: fc-groom-squint 10s ease-in-out infinite;
        animation-delay: 2s;
      }

      @keyframes fc-groom-squint {
        0%, 75%   { transform: scaleY(1);   }
        79%       { transform: scaleY(0.2); }
        82%       { transform: scaleY(0.2); }
        86%, 100% { transform: scaleY(1);   }
      }

      /* ── 6b. Grooming paw ─────────────────────────────────────────────────────
         10 s cycle, same delay as head-group so head and paw are in sync.

         Timing (10 s = 100 %):
           0 – 63 %  (0 – 6.3 s)  rest — paw hidden below viewBox
           63 – 70 % (6.3 – 7.0 s) rise — paw climbs to mouth level
           70 – 73 % (7.0 – 7.3 s) lick — dips toward mouth, back up
           73 – 76 % (7.3 – 7.6 s) second lick bob
           76 – 83 % (7.6 – 8.3 s) wipe — sweeps right across cheek
           83 – 93 % (8.3 – 9.3 s) retract — paw drops back below
           93 – 100% (9.3 – 10 s)  rest

         translate(0, 130px)         = resting pos, clipped below viewBox
         translate(0, 0)             = mouth/chin area  (paw cy ≈ 383, mouth cy ≈ 310)
         translate(80px, −50px)      = right-cheek area (paw cx ≈ 301, cy ≈ 333)
         rotate(−20deg)              = wiping angle during sweep                  */
      #fc-paw {
        transform-box: fill-box;
        transform-origin: center;
        animation: fc-paw-groom 10s ease-in-out infinite;
        animation-delay: 2s;
      }

      @keyframes fc-paw-groom {
        0%, 63%  { transform: translate(0px,   130px);                  opacity: 0;   }
        70%      { transform: translate(0px,     0px);                  opacity: 1;   }
        73%      { transform: translate(0px,    16px);                  opacity: 1;   }
        76%      { transform: translate(0px,     0px);                  opacity: 1;   }
        83%      { transform: translate(80px,  -50px) rotate(-20deg);   opacity: 1;   }
        88%      { transform: translate(20px,   65px) rotate(-6deg);    opacity: 0.3; }
        93%      { transform: translate(0px,   130px);                  opacity: 0;   }
        100%     { transform: translate(0px,   130px);                  opacity: 0;   }
      }
    </style>
  </defs>

  <g id="fc-head-group">

    <!-- Soft drop shadow -->
    <ellipse class="shadow" cx="256" cy="410" rx="160" ry="44"/>

    <!-- Head outline (rounded blob) -->
    <path class="stroke" d="
      M 140 214
      C 110 250, 104 294, 118 335
      C 136 388, 188 414, 256 414
      C 324 414, 376 388, 394 335
      C 408 294, 402 250, 372 214
      C 350 188, 316 172, 256 172
      C 196 172, 162 188, 140 214
      Z"/>

    <!-- Left ear -->
    <g id="fc-ear-left">
      <path class="stroke" d="M 170 206 L 190 138 L 234 184"/>
      <path class="fill-pink" d="M 189 160 L 202 146 L 220 170 L 203 181 Z" opacity="0.9"/>
    </g>

    <!-- Right ear (animated twitch) -->
    <g id="fc-ear-right">
      <path class="stroke" d="M 342 206 L 322 138 L 278 184"/>
      <path class="fill-pink" d="M 323 160 L 310 146 L 292 170 L 309 181 Z" opacity="0.9"/>
    </g>

    <!-- Eyes (animated blink; right eye also has grooming squint via wrapper group) -->
    <circle id="fc-eye-left" class="fill-dark" cx="206" cy="266" r="20"/>
    <g id="fc-eye-right-g">
      <circle id="fc-eye-right" class="fill-dark" cx="306" cy="266" r="20"/>
    </g>

    <!-- Mouth (tiny W) -->
    <path class="stroke" d="M 240 310 C 247 320, 256 320, 263 310"/>
    <path class="stroke" d="M 263 310 C 270 320, 279 320, 286 310"/>

    <!-- Cheek blush -->
    <path class="fill-pink" d="M 166 298 C 182 285, 206 287, 216 304 C 205 322, 182 326, 166 313 Z" opacity="0.55"/>
    <path class="fill-pink" d="M 346 298 C 330 285, 306 287, 296 304 C 307 322, 330 326, 346 313 Z" opacity="0.55"/>

    <!-- Whiskers -->
    <path class="stroke" d="M 116 276 L 156 286"/>
    <path class="stroke" d="M 114 308 L 156 306"/>
    <path class="stroke" d="M 396 276 L 356 286"/>
    <path class="stroke" d="M 398 308 L 356 306"/>

    <!-- Sparkle star (animated pulse) -->
    <path id="fc-star" class="fill-star" d="M 406 164
      C 416 164, 424 172, 424 182
      C 424 172, 432 164, 442 164
      C 432 164, 424 156, 424 146
      C 424 156, 416 164, 406 164 Z"/>

    <!-- Front paw (grooming animation) ──────────────────────────────────────
         Defined at chin level. At rest it sits 130 px below (outside viewBox).
         Drawn back-to-front: toe bumps first, then pad body on top.          -->
    <g id="fc-paw">
      <!-- Toe bumps (visible above the pad body) -->
      <circle cx="197" cy="358" r="15" fill="#efe4d2" stroke="#1f1a17" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="221" cy="351" r="15" fill="#efe4d2" stroke="#1f1a17" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="245" cy="358" r="15" fill="#efe4d2" stroke="#1f1a17" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Paw pad body (covers lower halves of toe circles) -->
      <ellipse cx="221" cy="383" rx="40" ry="28" fill="#efe4d2" stroke="#1f1a17" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Toe beans (small decorative pads) -->
      <circle  cx="204" cy="377" r="7"  fill="#d4b896"/>
      <circle  cx="221" cy="374" r="7"  fill="#d4b896"/>
      <circle  cx="238" cy="377" r="7"  fill="#d4b896"/>
      <ellipse cx="221" cy="391" rx="9" ry="7" fill="#d4b896"/>
    </g>

  </g>

</svg>
